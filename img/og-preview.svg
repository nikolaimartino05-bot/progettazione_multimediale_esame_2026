<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Nikolai Martino  Media Design e Comunicazione Visiva">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#e8f2fa"/>
      <stop offset="55%" stop-color="#dce9f5"/>
      <stop offset="100%" stop-color="#c8dcf0"/>
    </radialGradient>
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="ringPath" d="M 600,315 m -150,0 a 150,150 0 1,1 300,0 a 150,150 0 1,1 -300,0"/>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#ffffff" filter="url(#starGlow)" opacity="0.9">
    <circle cx="120" cy="80" r="2.2"/><circle cx="280" cy="140" r="1.6"/><circle cx="450" cy="60" r="2"/><circle cx="720" cy="95" r="1.8"/>
    <circle cx="980" cy="120" r="2.4"/><circle cx="1080" cy="55" r="1.5"/><circle cx="90" cy="220" r="1.7"/><circle cx="340" cy="280" r="2.1"/>
    <circle cx="560" cy="180" r="1.4"/><circle cx="840" cy="240" r="2"/><circle cx="1040" cy="300" r="1.6"/><circle cx="150" cy="420" r="2.2"/>
    <circle cx="400" cy="500" r="1.5"/><circle cx="650" cy="450" r="1.8"/><circle cx="900" cy="520" r="2"/><circle cx="1100" cy="410" r="1.7"/>
    <circle cx="220" cy="560" r="1.4"/><circle cx="500" cy="580" r="2.1"/><circle cx="780" cy="560" r="1.6"/><circle cx="60" cy="360" r="1.8"/>
    <circle cx="1150" cy="200" r="1.5"/><circle cx="30" cy="120" r="1.3"/><circle cx="1020" cy="580" r="1.9"/>
  </g>

  <!-- Badge circle -->
  <circle cx="600" cy="315" r="178" fill="rgba(220,233,245,0.55)" stroke="rgba(26,25,22,0.08)" stroke-width="1"/>

  <!-- Ring text -->
  <text font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#1a1916" filter="url(#textGlow)">
    <textPath href="#ringPath" startOffset="0%">
      À MEDIA DESIGN À COMUNICAZIONE VISIVA À NIKOLAI MARTINO À MEDIA DESIGN À COMUNICAZIONE VISIVA À
    </textPath>
  </text>

  <!-- Center name -->
  <text x="600" y="295" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="900" fill="#1a1916" filter="url(#textGlow)">NIKOLAI</text>
  <text x="600" y="355" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="900" fill="#1a1916" filter="url(#textGlow)">MARTINO</text>

  <!-- Ornament lines -->
  <line x1="600" y1="255" x2="600" y2="270" stroke="rgba(26,25,22,0.25)" stroke-width="1"/>
  <line x1="600" y1="370" x2="600" y2="385" stroke="rgba(26,25,22,0.25)" stroke-width="1"/>
</svg>
